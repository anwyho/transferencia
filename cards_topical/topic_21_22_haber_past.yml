  # ---------------- haber + lo before haber (full drill) ----------------
  - id: t21_22-020
    type: sentence
    tier: extended
    front_en: "I have lost it."
    back_es: "Lo he perdido."
    rule_ref: "L22#4"
    lessons: [21, 22]
    directions: [en_es, es_en]
