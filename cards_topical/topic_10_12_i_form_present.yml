topic: "I-form + present tense"
lessons: [10, 11, 12]
cards:
  # ---------------- I-form (L10) + -ar/-er full present (L12) on lesson_10 vocab ----------------
  # The cross-bundle move: take a verb introduced in L10 and conjugate it for the
  # he/she-form, they-form, you-inf form (rules from L11 / L12) — only possible
  # once we hit L12. So lessons must include 12.

  - id: t10_12-001
    type: conjugation
    tier: extended
    front_en: "she form of intentar"
    back_es: "intenta"
    hint: "key vowel /a/"
    rule_ref: "L11#4, L10#1"
    lessons: [10, 11, 12]
    directions: [en_es]
  - id: t10_12-002
    type: conjugation
    tier: extended
    front_en: "they form of intentar"
    back_es: "intentan"
    hint: "+ n"
    rule_ref: "L12#2, L10#1"
    lessons: [10, 12]
    directions: [en_es]
  - id: t10_12-003
    type: conjugation
    tier: extended
    front_en: "you (informal) form of intentar"
    back_es: "intentas"
    hint: "+ s"
    rule_ref: "L12#3, L10#1"
    lessons: [10, 12]
    directions: [en_es]
