    type: conjugation
    tier: extended
    front_en: "she form of tener"
    back_es: "tiene"
    hint: "irregular: e→ie (preview)"
    rule_ref: "L10#10"
    lessons: [10, 12]
    directions: [en_es]
    notes: "Vowel split lands L15-17; included as foreshadow."
  - id: t10_12-019
    type: conjugation
    tier: extended
