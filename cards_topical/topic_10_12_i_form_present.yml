  # ---------------- I-form sentence drills (L10 verb + L11/L12 patterns) ----------------
  - id: t10_12-021
    type: sentence
    tier: extended
    front_en: "I'm selling the house."
    back_es: "Vendo la casa."
    rule_ref: "L12#10, L10#3"
    lessons: [10, 12]
    directions: [en_es, es_en]
  - id: t10_12-022
    type: sentence
    tier: extended
    front_en: "I'm not eating it."
    back_es: "No lo como."
    rule_ref: "L11#9, L10#3"
    lessons: [10, 11, 12]
    directions: [en_es, es_en]
  - id: t10_12-023
    type: sentence
    tier: extended
    front_en: "I have to sell it."
    back_es: "Tengo que venderlo."
    hint: "tengo que + infinitive"
    rule_ref: "L10#11, L12#6"
    lessons: [10, 12]
    directions: [en_es, es_en]
  - id: t10_12-024
    type: sentence
    tier: extended
    front_en: "I have to sell it. (alt)"
    back_es: "Lo tengo que vender."
    hint: "lo before tengo"
    rule_ref: "L10#11, L11#10"
    lessons: [10, 11, 12]
    directions: [en_es, es_en]
  - id: t10_12-025
    type: sentence
    tier: extended
    front_en: "I have to maintain it."
    back_es: "Tengo que mantenerlo."
    rule_ref: "L10#11, L10#10"
    lessons: [10, 12]
    directions: [en_es, es_en]
  - id: t10_12-026
    type: sentence
    tier: extended
    front_en: "I have to obtain it."
    back_es: "Tengo que obtenerlo."
    rule_ref: "L10#11, L10#10"
    lessons: [10, 12]
    directions: [en_es, es_en]
  - id: t10_12-027
    type: sentence
    tier: extended
    front_en: "I have to sustain it."
    back_es: "Tengo que sostenerlo."
    rule_ref: "L10#11, L10#10"
    lessons: [10, 12]
    directions: [en_es, es_en]
  - id: t10_12-028
    type: sentence
    tier: extended
    front_en: "I'm coming tomorrow with Pablo."
    back_es: "Vengo mañana con Pablo."
    rule_ref: "L10#12, L10#7"
    lessons: [10, 12]
    directions: [en_es, es_en]
  - id: t10_12-029
    type: sentence
    tier: extended
    front_en: "I have it. (lo + tengo)"
    back_es: "Lo tengo."
    rule_ref: "L11#9, L10#11"
    lessons: [10, 11, 12]
    directions: [en_es, es_en]
  - id: t10_12-030
    type: sentence
    tier: extended
    front_en: "He has something."
    back_es: "Tiene algo."
    rule_ref: "L12#21, L10#10"
    lessons: [10, 12]
    directions: [en_es, es_en]

  # ---------------- Pronoun stacking (L12) on L10 verbs ----------------
  - id: t10_12-031
    type: sentence
    tier: extended
    front_en: "He's giving it to me."
    back_es: "Me lo dona."
    rule_ref: "L12#19, L10#3"
    lessons: [10, 12]
    directions: [en_es, es_en]
  - id: t10_12-032
    type: sentence
    tier: extended
    front_en: "They're donating it to us."
    back_es: "Nos lo donan."
    rule_ref: "L12#19, L10#3"
    lessons: [10, 12]
    directions: [en_es, es_en]
  - id: t10_12-033
    type: sentence
    tier: extended
    front_en: "Why don't they donate it?"
    back_es: "¿Por qué no lo donan?"
    rule_ref: "L12#20, L10#3"
    lessons: [10, 12]
    directions: [en_es, es_en]
  - id: t10_12-034
    type: sentence
    tier: extended
    front_en: "He's revealing it to me."
    back_es: "Me lo revela."
    rule_ref: "L12#19, L10#3"
    lessons: [10, 12]
    directions: [en_es, es_en]
  - id: t10_12-035
    type: sentence
    tier: extended
    front_en: "He's organizing it."
    back_es: "Lo organiza."
    rule_ref: "L11#9, L10#3"
    lessons: [10, 11, 12]
    directions: [en_es, es_en]
  - id: t10_12-036
    type: sentence
    tier: extended
    front_en: "They're organizing it."
    back_es: "Lo organizan."
    rule_ref: "L12#2, L10#3"
    lessons: [10, 12]
    directions: [en_es, es_en]
  - id: t10_12-037
    type: sentence
    tier: extended
    front_en: "We're not organizing it."
    back_es: "No lo organizan."
    hint: "they form covers 'we' loosely"
    rule_ref: "L12#2, L10#3"
    lessons: [10, 12]
    directions: [en_es, es_en]
    notes: "Strict 'we' lands L17-18; using they-form here as approximation."
  - id: t10_12-038
    type: sentence
    tier: extended
    front_en: "She's chewing something."
    back_es: "Mastica algo."
    rule_ref: "L12#21, L11#4"
    lessons: [11, 12]
    directions: [en_es, es_en]
  - id: t10_12-039
    type: sentence
    tier: extended
    front_en: "I'm chewing it."
    back_es: "Lo mastico."
    rule_ref: "L11#9, L10#3"
    lessons: [10, 11, 12]
    directions: [en_es, es_en]
  - id: t10_12-040
    type: sentence
    tier: extended
    front_en: "He invites them."
    back_es: "Los invita."
    rule_ref: "L11#9, L11#4"
    lessons: [11, 12]
    directions: [en_es, es_en]

